<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | OTMania</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/index.css">
</head>

<body>
    <!-- Top -->
    <div class="top-bar container">
        <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Rockwell_Automation_logo_%282019%29.svg/1280px-Rockwell_Automation_logo_%282019%29.svg.png">
    </div>

    <div class="main-content d-flex flex-column justify-content-center align-items-center">

    <!-- Title -->
    <div class="subtitle mb-4">
        <h4>Welcome to OTMANIA</h4>
        <p>by Rockwell Automation</p>
    </div>

    <!-- Login -->
    <div class="col-11 col-sm-8 col-md-6 login-box text-center">    
        <h5 class="mb-4" style="color:#CD163F;">Login</h5>

        <form>
            <div class="mb-3">
                <input type="email" class="form-control" placeholder="Email" id="email">
            </div>

            <div class="mb-2">
                <input type="password" class="form-control" placeholder="Password" id="password">
            </div>

            <div class="text-end mb-3">
                <a href="change-password.html" class="link-custom">
                    Forgot your password?
                </a>
            </div>

            <button class="btn btn-custom" id="btnLogin">Submit</button>

            <p id="errorMessage" class="error mt-2"></p>
        </form>

    </div>

    <!-- Bottom -->
    <p class="mt-4 text-center">
        Don't have an account? 
        <a href="sign-up.html" class="link-custom">
            Sign up
        </a>
    </p>

    <script src="../js/index.js"></script>
</body>
</html>
