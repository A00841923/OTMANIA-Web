<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | OTMania</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons (Bootstrap Icons) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/sign-up.css">
</head>

<body>
    <!-- Top -->
    <div class="top-bar container">
        <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Rockwell_Automation_logo_%282019%29.svg/1280px-Rockwell_Automation_logo_%282019%29.svg.png">
    </div>

    <div class="main-content d-flex flex-column align-items-center">

    <!-- Title -->
    <div class="subtitle mb-4">
        <h4>Create an Account</h4>
        <p>Join OTMANIA experience</p>
    </div>

    <!-- SIGN UP -->
    <div class="col-11 col-sm-8 col-md-6 signup-box text-center">
        
        <div id="signupSection">
        <form id="signupForm">
            <!-- NAME -->
            <div class="row">
                <div class="col-md-6 mb-3">
                    <input type="text" id="firstName" class="form-control" placeholder="First Name">
                </div>
                <div class="col-md-6 mb-3">
                    <input type="text" id="lastName" class="form-control" placeholder="Last Name">
                </div>
            </div>

            <!-- COUNTRY -->
            <div class="mb-3">
                <input type="text" id="country" class="form-control" placeholder="Country">
            </div>

            <!-- EMAIL -->
            <div class="mb-3">
                <input type="email" id="email" class="form-control" placeholder="Email">
            </div>

            <!-- NICKNAME -->
            <div class="mb-3">
                <input type="text" id="nickname" class="form-control" placeholder="Nickname">
            </div>

            <!-- PASSWORD -->
            <div class="mb-2">
                <input type="password" id="password" class="form-control" placeholder="Password">
            </div>

            <!-- PASSWORD REQUIREMENTS -->
            <p class="requirements mt-1">
                Password must contain:
                <br>• <span id="req-length">At least 8 characters</span>  
                <br>• <span id="req-upper">One uppercase letter</span>  
                <br>• <span id="req-number">One number</span>  
                <br>• <span id="req-special">One special character (!@#$%^&*)</span>
            </p>

            <!-- ERROR -->
            <p id="errorMessage" class="error mt-2"></p>

            <!-- BUTTON -->
            <button class="btn btn-custom w-100 mt-3">Create Account</button>
            </form>
            </div>

            <!-- VERIFICATION -->
            <div id="verificationSection" class="verification mt-4 text-center">
                <p>
                    A verification code was sent to your email.
                </p>

                <div class="otp-container d-flex justify-content-center gap-2 mb-3">
                    <input type="text" maxlength="1" class="otp form-control text-center" />
                    <input type="text" maxlength="1" class="otp form-control text-center" />
                    <input type="text" maxlength="1" class="otp form-control text-center" />
                    <input type="text" maxlength="1" class="otp form-control text-center" />
                    <input type="text" maxlength="1" class="otp form-control text-center" />
                    <input type="text" maxlength="1" class="otp form-control text-center" />
                </div>

                <button class="btn btn-success w-100">Verify Account</button>
            </div>

    <!-- LOGIN REDIRECT -->
    <p class="mt-4 text-center">
        Already have an account? 
        <a href="index.html" class="link-custom">
            Log in
        </a>
    </p>
</div>

    <!-- FOOTER -->
    <footer class="footer w-100 d-flex justify-content-between align-items-center flex-wrap">
        <div style="font-weight: bold;">
            Rockwell Automation
        </div>
        <div style="font-size: 14px;">
            © 2026 OTMANIA. All rights reserved.
        </div>
        <div class="social-icons">
            <i class="bi bi-facebook"></i>
            <i class="bi bi-linkedin"></i>
            <i class="bi bi-twitter-x"></i>
            <i class="bi bi-youtube"></i>
        </div>
    </footer>  



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/sign-up.js"></script>
</body>
</html>
